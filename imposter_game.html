<!DOCTYPE html>
<html>
<head>


<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Imposter Game</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

body{
font-family: "Poppins","Segoe UI Emoji","Apple Color Emoji",sans-serif;
margin:0;
background:linear-gradient(135deg,#6a11cb,#2575fc,#ff3cac);
background-size:400% 400%;
animation:gradientMove 15s ease infinite;
color:white;
text-align:center;
overflow-x:hidden;
overflow-y:auto;
min-height:100vh;
}

@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
max-width:420px;
margin:auto;
padding:25px;
background:rgba(255,255,255,0.05);
border-radius:25px;
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(0,0,0,0.3);
}


h1{
font-size:32px;
font-weight:700;
margin-bottom:10px;
}

label{
font-weight:600;
font-size:14px;
}

input,select{
width:100%;
padding:14px;
margin:10px 0;
border-radius:14px;
border:none;
font-size:16px;
outline:none;
background:rgba(255,255,255,0.2);
color:white;
backdrop-filter:blur(8px);
}
/* Custom dropdown arrow */
select{
appearance:none;
-webkit-appearance:none;
-moz-appearance:none;

background-image:url("data:image/svg+xml;utf8,<svg fill='white' height='20' viewBox='0 0 24 24' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
background-repeat:no-repeat;
background-position:right 15px center;
background-size:18px;
padding-right:40px;
}
input::placeholder{
color:white;
}

button{
width:100%;
padding:16px;
margin-top:20px;
border:none;
border-radius:18px;
font-size:18px;
font-weight:700;
color:white;
cursor:pointer;

background:linear-gradient(90deg,#ff3cac,#784ba0,#2b86c5);
background-size:200%;

animation:buttonGlow 4s linear infinite;

box-shadow:0 0 15px rgba(255,60,172,0.7);
transition:transform 0.25s;
}

button:hover{
transform:scale(1.08);
}

@keyframes buttonGlow{
0%{background-position:0%}
100%{background-position:200%}
}

button:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.hidden{
display:none;
}

/* CARD */

.card-container{
perspective:1000px;
margin-top:30px;
}

.card{
width:280px;
height:180px;
margin:auto;
transform-style:preserve-3d;
transition:transform 0.7s cubic-bezier(.17,.67,.83,.67);
position:relative;
cursor:pointer;
}
.card, .face, .front, .back{
-webkit-user-select: none;
-moz-user-select: none;
-ms-user-select: none;
user-select: none;

-webkit-touch-callout: none;
}
.card:hover{
transform:scale(1.05);
}

.card.flip{
transform:rotateY(180deg);
}

.face{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
backface-visibility:hidden;
box-shadow:0 15px 35px rgba(0,0,0,0.4);
}

.front{
background:rgba(255,255,255,0.25);
backdrop-filter:blur(12px);
color:white;
font-weight:700;
font-size:24px;
letter-spacing:1px;
}

.back{
background:linear-gradient(135deg,#ff3cac,#784ba0,#2b86c5);
transform:rotateY(180deg);
font-weight:800;
font-size:28px;
}

/* player text */

#playerTurn{
font-size:24px;
margin-top:20px;
font-weight:700;
animation:fadePop 0.5s ease;
}

@keyframes fadePop{
0%{opacity:0; transform:scale(0.8);}
100%{opacity:1; transform:scale(1);}
}

/* starter screen */

.startBox{
margin-top:40px;
font-size:28px;
font-weight:700;
animation:pop 0.6s ease;
}

@keyframes pop{
0%{transform:scale(0.6);opacity:0}
100%{transform:scale(1);opacity:1}
}

/* floating emojis */

.emoji{
position:fixed;
font-size:22px;
animation:float 8s linear infinite;
opacity:0.7;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-120vh)}
}


</style>

</head>

<body>

<div class="container">

<h1>🛸 Imposter Game</h1>

<label>Number of Players</label>
<input type="number" id="players" min="3" max="20" value="5">

<label>Category</label>
<select id="category"></select>

<button onclick="startGame()">Start Game</button>

<div id="gameArea" class="hidden">

<h2 id="playerTurn"></h2>

<p>Press and hold the card to see your role</p>

<div class="card-container">

<div class="card" id="card">

<div class="face front">
Hold To Reveal
</div>

<div class="face back" id="cardText">
Word
</div>

</div>

</div>

<button id="nextBtn" onclick="nextPlayer()" class="hidden">
Next Player
</button>

</div>

<div id="starter" class="hidden startBox">

<div id="starterText"></div>

<button onclick="location.reload()">Restart</button>

</div>

</div>

<script>

const categories = {
"🐾 Animals":[
"🦁Lion","🐯Tiger","🐘Elephant","🐶Dog","🐱Cat","🐵Monkey",
"🦒Giraffe","🦓Zebra","🐻Bear","🐺Wolf","🦘Kangaroo","🐼Panda",
"🐴Horse","🐰Rabbit","🦊Fox"
],

"😋 Foods":[
"Pizza","Burger","Biryani","Dosa","Ice Cream",
"Parotta","Pongal","Sandwich","Noodles","Fried Rice",
"Idli","Sadhyaa","Chocolate","Cake","French Fries"
],

"🎬 Movies":[
"Avatar","Titanic","Batman","Joker",
"Spiderman","Inception","Frozen","Gladiator",
"Matrix","Avengers","Interstellar","Aladdin",
"Rocky","Jaws","Terminator"
],

"🌍 Countries":[
"🇮🇳India","🇯🇵Japan","🇧🇷Brazil","🇮🇹Italy",
"🇨🇦Canada","🇩🇪Germany","🇦🇺Australia","🇲🇽Mexico",
"🇫🇷France","🇨🇳China","🇪🇸Spain","🇦🇷Argentina",
"🇪🇬Egypt","🇹🇭Thailand","🇸🇯Norway"
],

"💼 Jobs":[
"👩‍⚕️Doctor","👷‍♂️Architect","👩‍✈️Pilot","👨‍🍳Chef","👩‍🏫Teacher",
"👮‍♂️Police","👩‍🚒Firefighter","👨‍🚀Astronaut","👩‍🔬Scientist",
"👨‍🌾Farmer","🚦Driver","👩‍💼Engineer","👨‍⚖️Lawyer",
"📷Photographer","📰Journalist"
]
}
const categorySelect=document.getElementById("category")

for(let c in categories){
let op=document.createElement("option")
op.value=c
op.text=c
categorySelect.appendChild(op)
}

let players=[]
let imposterIndex
let word
let currentPlayer=0

function startGame(){

let numPlayers=parseInt(document.getElementById("players").value)

let cat=document.getElementById("category").value

let words=categories[cat]

word=words[Math.floor(Math.random()*words.length)]

imposterIndex=Math.floor(Math.random()*numPlayers)

players=[]

for(let i=0;i<numPlayers;i++){

if(i===imposterIndex){
players.push("🕵️ IMPOSTER")
}else{
players.push(word)
}

}

currentPlayer=0

document.getElementById("gameArea").classList.remove("hidden")

updateTurn()

}

function updateTurn(){

document.getElementById("playerTurn").innerText=
"Player "+(currentPlayer+1)

let card=document.getElementById("card")

card.classList.remove("flip")

document.getElementById("cardText").innerText=players[currentPlayer]

document.getElementById("nextBtn").classList.add("hidden")

}

/* hold to reveal */

const card=document.getElementById("card")

card.addEventListener("mousedown",showCard)
card.addEventListener("touchstart",showCard)

card.addEventListener("mouseup",hideCard)
card.addEventListener("mouseleave",hideCard)
card.addEventListener("touchend",hideCard)

function showCard(){

card.classList.add("flip")

}

function hideCard(){

card.classList.remove("flip")

document.getElementById("nextBtn").classList.remove("hidden")

}

function nextPlayer(){

currentPlayer++

if(currentPlayer>=players.length){

chooseStarter()

}else{

updateTurn()

}

}

function chooseStarter(){

document.getElementById("gameArea").classList.add("hidden")

let starter=Math.floor(Math.random()*players.length)+1

document.getElementById("starter").classList.remove("hidden")

document.getElementById("starterText").innerHTML=
"🚀 Player "+starter+" Starts!"

}

</script>

</body>

</html>
